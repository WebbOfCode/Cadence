<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Coast Guard Shield Background -->
  <path d="M 50,50 L 150,50 L 150,130 Q 100,160 50,130 Z" fill="#003366" stroke="#CC0000" stroke-width="2"/>
  
  <!-- Inner shield -->
  <path d="M 60,60 L 140,60 L 140,125 Q 100,150 60,125 Z" fill="#FFFFFF"/>
  
  <!-- Anchor (main symbol) -->
  <g transform="translate(100, 85)">
    <!-- Anchor shaft -->
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#003366" stroke-width="3"/>
    
    <!-- Anchor flukes -->
    <path d="M -12,20 Q -18,26 -12,32 M 0,24 L 0,32 M 12,20 Q 18,26 12,32" 
          stroke="#003366" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Anchor ring -->
    <circle cx="0" cy="-20" r="5" fill="#003366"/>
    
    <!-- Rope wrap -->
    <path d="M -8,-18 Q -5,-15 -8,-12 Q -5,-9 -8,-6" 
          stroke="#CC0000" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Star at top -->
  <g transform="translate(100, 30)">
    <path d="M 0,-8 L 2,-2 L 8,-2 L 3,2 L 5,8 L 0,4 L -5,8 L -3,2 L -8,-2 L -2,-2 Z" 
          fill="#CC0000"/>
  </g>
  
  <!-- Coast Guard Text -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#003366">U.S. COAST GUARD</text>
</svg>
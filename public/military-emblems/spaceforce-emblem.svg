<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Space Force Blue Circle -->
  <circle cx="100" cy="100" r="95" fill="#0033A0" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Delta Symbol -->
  <g transform="translate(100, 100)">
    <!-- Outer Delta -->
    <path d="M 0,-45 L 45,35 L -45,35 Z" fill="none" stroke="#FFD700" stroke-width="3"/>
    
    <!-- Inner Delta -->
    <path d="M 0,-35 L 35,25 L -35,25 Z" fill="#FFD700" stroke="#0033A0" stroke-width="1"/>
    
    <!-- Star at center -->
    <circle cx="0" cy="5" r="8" fill="#0033A0" stroke="#FFD700" stroke-width="1"/>
    <path d="M 0,-5 L 2,-1 L 6,-1 L 3,2 L 4,6 L 0,3 L -4,6 L -3,2 L -6,-1 L -2,-1 Z" 
          fill="#FFD700"/>
  </g>
  
  <!-- Space Force Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#FFD700">U.S. SPACE FORCE</text>
</svg>